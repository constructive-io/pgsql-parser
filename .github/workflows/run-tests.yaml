name: Parser tests
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  parser-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - pgsql-deparser
          - pgsql-parser
          - plpgsql-deparser
          - plpgsql-parser
          - pg-proto-parser
          - '@pgsql/quotes'
          - '@pgsql/transform'
    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: install dependencies
        run: pnpm install

      - name: build
        run: pnpm build

      - name: test
        run: pnpm --filter ${{ matrix.package }} test
# CI trigger
